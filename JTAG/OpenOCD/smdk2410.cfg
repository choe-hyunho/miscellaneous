# Target configuration for the Samsung s3c2410 system on chip
# Tested on a SMDK2410
# Processor       : ARM920T
# Info:   JTAG device found: 0x0032409d (Manufacturer: 0x04e, Part: 0x0324, Version: 0x0)

source [find target/samsung_s3c2410.cfg]

$_TARGETNAME configure -event reset-init { smdk2410_init }
$_TARGETNAME configure -event gdb-attach { reset init }

proc init_pll_sdram { } {
	#echo "---------- Initializing PLL and SDRAM ---------"
	#watchdog timer disable
	mww phys 0x53000000 0x00000000
	#disable all interrupts
	mww phys 0x4a000008 0xffffffff
	#disable all sub-interrupts
	mww phys 0x4a00001c 0x000007ff
	#clear all source pending bits
	mww phys 0x4a000000 0xffffffff
	#clear all sub-source pending bits
	mww phys 0x4a000018 0x000007ff
	#clear interrupt pending bit
	mww phys 0x4a000010 0xffffffff
	#PLL locktime counter
	mww phys 0x4c000000 0x00ffffff
	#Fin=12MHz Fout=202.8MHz
	#mww phys 0x4c000004 0x000a1031
	#FCLK:HCLK:PCLK = 1:2:4
	mww phys 0x4c000014 0x00000003
	#B1=32, B2=16, B3=16,WE,UBLB, B4,B5=16, B6,B7=32
	mww phys 0x48000000 0x2211D120
	#BANK0 ACS=0, COS=0, ACC=14, COH=0, CAH=0, ACP=0, PMC=NORMAL
	mww phys 0x48000004 0x00000700
	#BANK1 ACS=0, COS=0, ACC=14, COH=0, CAH=0, ACP=0, PMC=NORMAL
	mww phys 0x48000008 0x00000700
	#BANK2 ACS=0, COS=0, ACC=14, COH=0, CAH=0, ACP=0, PMC=NORMAL
	mww phys 0x4800000c 0x00000700
	#BANK3 ACS=0, COS=4, ACC=14, COH=1, CAH=0, ACP=6, PMC=NORMAL
	mww phys 0x48000010 0x00001f4c
	#BANK4 ACS=0, COS=0, ACC=14, COH=0, CAH=0, ACP=0, PMC=NORMAL
	mww phys 0x48000014 0x00000700
	#BANK5 ACS=0, COS=0, ACC=14, COH=0, CAH=0, ACP=0, PMC=NORMAL
	mww phys 0x48000018 0x00000700
	#BANK6 MT=SDRAM, RCD=3, SCAN=9
	mww phys 0x4800001c 0x00018005
	#BANK7 MT=SDRAM, RCD=3, SCAN=9
	mww phys 0x48000020 0x00018005
	#REFEN, Auto Refresh, RP=2, SRC=7, CHR=3, REFCNT=1113
	mww phys 0x48000024 0x008e0459
	#BURST=0, SCKE=1, SCLK=1, BANK6/7=128MB
	mww phys 0x48000028 0x00000032
	#BANK6 CAS=3
	mww phys 0x4800002c 0x00000030
	#BANK7 CAS=3
	mww phys 0x48000030 0x00000030
}

proc smdk2410_init { } {
	init_pll_sdram
	#echo "---------- Probing Nor flash ----------"
	flash probe 0
	#echo "---------- Probing Nand flash ----------"
	nand probe 0
	#echo "---------- Enable some functions ----------"
}

set _FLASHNAME $_CHIPNAME.flash
flash bank $_FLASHNAME cfi 0x00000000 0x100000 2 2 $_TARGETNAME

set _NANDNAME $_CHIPNAME.nand
nand device $_NANDNAME s3c2410 $_TARGETNAME
